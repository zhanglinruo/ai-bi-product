<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>数答 - AI 智能数据分析平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .app { display: flex; height: 100vh; }
    
    /* 侧边栏 */
    .sidebar {
      width: 240px;
      background: #1e293b;
      border-right: 1px solid #334155;
      padding: 20px 0;
    }
    .logo {
      padding: 0 20px 20px;
      border-bottom: 1px solid #334155;
      margin-bottom: 20px;
    }
    .logo h1 { font-size: 24px; color: #60a5fa; }
    .logo p { font-size: 12px; color: #64748b; margin-top: 4px; }
    .nav-item {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-item:hover { background: #334155; }
    .nav-item.active { background: #3b82f6; color: white; }
    .nav-item span { font-size: 14px; }
    
    /* 主内容 */
    .main { flex: 1; display: flex; flex-direction: column; }
    .header {
      padding: 16px 24px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h2 { font-size: 18px; font-weight: 500; }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #3b82f6; display: flex; align-items: center; justify-content: center; }
    
    /* 查询区域 */
    .query-section {
      padding: 40px 24px;
      text-align: center;
    }
    .query-title { font-size: 28px; margin-bottom: 8px; }
    .query-subtitle { color: #64748b; margin-bottom: 32px; }
    .query-input-container {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }
    .query-input {
      width: 100%;
      padding: 16px 60px 16px 20px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 16px;
      outline: none;
    }
    .query-input:focus { border-color: #3b82f6; }
    .query-btn {
      position: absolute;
      right: 8px;
      top: 8px;
      padding: 8px 16px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    
    /* 结果区域 */
    .result-section {
      padding: 0 24px 40px;
    }
    .result-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .sql-badge {
      background: #334155;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
    }
    .result-table {
      width: 100%;
      border-collapse: collapse;
    }
    .result-table th {
      text-align: left;
      padding: 12px;
      background: #334155;
      font-weight: 500;
    }
    .result-table td {
      padding: 12px;
      border-bottom: 1px solid #334155;
    }
    .result-table tr:hover { background: #33415533; }
    .total-row { font-weight: bold; color: #60a5fa; }
  </style>
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar">
      <div class="logo">
        <h1>📊 数答</h1>
        <p>AI 智能数据分析</p>
      </div>
      <div class="nav-item active">
        <span>💬</span>
        <span>智能查询</span>
      </div>
      <div class="nav-item">
        <span>📊</span>
        <span>仪表盘</span>
      </div>
      <div class="nav-item">
        <span>🗄️</span>
        <span>数据源</span>
      </div>
      <div class="nav-item">
        <span>📜</span>
        <span>历史记录</span>
      </div>
      <div class="nav-item">
        <span>⚙️</span>
        <span>设置</span>
      </div>
    </div>
    
    <!-- 主内容 -->
    <div class="main">
      <div class="header">
        <h2>智能查询</h2>
        <div class="user-info">
          <span>管理员</span>
          <div class="avatar">👤</div>
        </div>
      </div>
      
      <div class="query-section">
        <h1 class="query-title">用自然语言查询数据</h1>
        <p class="query-subtitle">输入您的问题，AI 将自动生成 SQL 并执行查询</p>
        <div class="query-input-container">
          <input class="query-input" type="text" value="按客户类型统计销售额" placeholder="输入您的问题...">
          <button class="query-btn">查询</button>
        </div>
      </div>
      
      <div class="result-section">
        <div class="result-card">
          <div class="result-header">
            <h3>查询结果</h3>
            <div class="sql-badge">SELECT c.customer_type, SUM(o.total_amount)... GROUP BY...</div>
          </div>
          <table class="result-table">
            <thead>
              <tr>
                <th>客户类型</th>
                <th>销售额 (元)</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>DISTRIBUTOR (分销商)</td>
                <td>273,408,499.08</td>
              </tr>
              <tr>
                <td>RETAIL (零售)</td>
                <td>234,802,538.60</td>
              </tr>
              <tr>
                <td>WHOLESALE (批发)</td>
                <td>207,326,472.18</td>
              </tr>
              <tr class="total-row">
                <td>合计</td>
                <td>715,537,509.86</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
